<!-- 🔥 ZERO-FLASH THEME SCRIPT (Sets color instantly before CSS loads) -->
<script>
  (function() {
    try {
      const saved = localStorage.getItem('app_theme');
      const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
      const isLight = saved === 'light' || (!saved && prefersLight);
      
      const root = document.documentElement;
      const metaTheme = document.querySelector('meta[name="theme-color"]');

      if (isLight) {
        root.setAttribute('data-theme', 'light');
        root.style.backgroundColor = '#f5f7fa'; // 🔥 Forces inline background instantly
        if(metaTheme) metaTheme.content = '#f5f7fa';
      } else {
        root.setAttribute('data-theme', 'dark');
        root.style.backgroundColor = '#0b0c0f'; // 🔥 Forces inline background instantly
        if(metaTheme) metaTheme.content = '#0b0c0f';
      }
    } catch (e) {}
  })();
</script>
